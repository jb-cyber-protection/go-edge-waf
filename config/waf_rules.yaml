mode: audit
sqli:
  - id: sqli_or_true
    pattern: "(?i)(?:'|%27)?\\s*or\\s+1\\s*=\\s*1"
  - id: sqli_union_select
    pattern: "(?i)\\bunion\\b\\s+\\bselect\\b"
  - id: sqli_drop_table
    pattern: "(?i)\\bdrop\\b\\s+\\btable\\b"
  - id: sqli_comment
    pattern: "(?i)(--|#|/\\*)"
  - id: xss_alert
    pattern: "(?i)alert\\("   

xss:
  - id: xss_script_tag
    pattern: "(?i)<\\s*script\\b"
  - id: xss_javascript_scheme
    pattern: "(?i)javascript\\s*:"
  - id: xss_event_handler
    pattern: "(?i)\\bon\\w+\\s*="
  - id: xss_encoded_script
    pattern: "(?i)%3c\\s*script\\b"
  - id: xss_encoded_js_scheme
    pattern: "(?i)javascript%3a"
